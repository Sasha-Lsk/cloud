<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1"/>
<meta name="theme-color" content="#252526"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mobile IDE</title>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <button class="icon-btn" id="btn-menu" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="title" id="topbar-title">Mobile IDE</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="btn-topbar-chats" aria-label="Список чатов" title="Список чатов" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="14" y2="13"/></svg>
      </button>
      <button class="icon-btn" id="btn-topbar-action" aria-label="Action" style="visibility:hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main">
    <!-- AI tab -->
    <div class="tab-panel" id="tab-ai" data-tab="ai">
      <div id="ai-header-info">
        <span class="hmp-label">Провайдер:</span>
        <div class="prov" id="ai-current-provider">не выбран</div>
        <button class="icon-btn" id="ai-clear" title="Очистить историю чата" aria-label="Очистить">
          <svg viewBox="0 0 960 960" fill="currentColor" aria-hidden="true">
            <path d="M440,440L520,440L520,160Q520,143 508.5,131.5Q497,120 480,120Q463,120 451.5,131.5Q440,143 440,160L440,440ZM200,600L760,600L760,520L200,520L200,600ZM142,840L240,840L240,760Q240,743 251.5,731.5Q263,720 280,720Q297,720 308.5,731.5Q320,743 320,760L320,840L440,840L440,760Q440,743 451.5,731.5Q463,720 480,720Q497,720 508.5,731.5Q520,743 520,760L520,840L640,840L640,760Q640,743 651.5,731.5Q663,720 680,720Q697,720 708.5,731.5Q720,743 720,760L720,840L818,840L778,680L182,680L142,840ZM818,920L142,920Q103,920 79,889Q55,858 65,820L120,600L120,520Q120,487 143.5,463.5Q167,440 200,440L360,440L360,160Q360,110 395,75Q430,40 480,40Q530,40 565,75Q600,110 600,160L600,440L760,440Q793,440 816.5,463.5Q840,487 840,520L840,600L895,820Q908,858 883.5,889Q859,920 818,920Z"/>
          </svg>
        </button>
      </div>
      <div id="ai-messages"></div>
      <div id="ai-attachments-preview"></div>
      <div id="ai-input-wrap">
        <button id="ai-attach" class="icon-btn" aria-label="Прикрепить файлы" title="Прикрепить файлы">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="ai-input" placeholder="Спросите ИИ или дайте задачу..." rows="1"></textarea>
        <button id="ai-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>

    <!-- Editor tab -->
    <div class="tab-panel" id="tab-editor" data-tab="editor">
      <div id="editor-toolbar">
        <div id="editor-tabs"></div>
        <button class="icon-btn" id="editor-settings-btn" title="Настройки редактора" aria-label="Настройки редактора">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="icon-btn" id="editor-save-btn" title="Сохранить (Ctrl+S)" aria-label="Сохранить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
      </div>
      <!-- Нативный текстовый редактор: обычный <textarea>, чтобы работало НАСТОЯЩЕЕ выделение
           текста средствами ОС/браузера — синяя подсветка, ручки-«капли» для ручного
           изменения границ выделения и системная плавающая панель (лупа/выделить всё/
           вырезать/копировать/вставить) при двойном тапе или удерживающем нажатии на слово. -->
      <div id="editor-code" style="display:none">
        <div id="editor-gutter" aria-hidden="true"></div>
        <div id="editor-scroll">
          <pre id="editor-highlight" aria-hidden="true"><code></code></pre>
          <textarea id="text-editor" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off" wrap="off"></textarea>
        </div>
      </div>
      <div id="monaco-container" style="display:none"></div>
      <div id="media-container"></div>
      <div id="editor-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        <div class="big">Файл не открыт</div>
        <div>Откройте файл через проводник</div>
        <button class="btn primary" id="empty-open-explorer">Открыть проводник</button>
      </div>
    </div>

    <!-- Explorer tab -->
    <div class="tab-panel" id="tab-explorer" data-tab="explorer">
      <div class="explorer-head">
        <div class="title" id="explorer-title">ПРОВОДНИК</div>
        <button class="icon-btn" id="exp-source" title="Источник файлов" aria-label="Источник файлов">
          <!-- Иконка: жёсткий диск. Подсвечивается, когда активен источник «Устройство»/«Импорт» — рядом появляется имя. -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="7" rx="1.5"/><rect x="2" y="13" width="20" height="7" rx="1.5"/><circle cx="6.5" cy="7.5" r="1" fill="currentColor" stroke="none"/><circle cx="6.5" cy="16.5" r="1" fill="currentColor" stroke="none"/><path d="M10 7.5h9M10 16.5h9"/></svg>
        </button>
        <span class="exp-source-label" id="exp-source-label" style="display:none"></span>
        <button class="icon-btn" id="exp-new-file" title="Новый файл">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        </button>
        <button class="icon-btn" id="exp-new-folder" title="Новая папка">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
        <button class="icon-btn" id="exp-refresh" title="Обновить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button class="icon-btn" id="exp-more" title="Ещё">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
      <div id="explorer-list"></div>
      <div id="explorer-empty" style="display:none">Проводник пуст. Создайте файл или импортируйте проект.</div>
    </div>

    <!-- Git tab -->
    <div class="tab-panel" id="tab-git" data-tab="git">
      <div class="git-head">
        <div class="title" id="git-title">GIT & GITHUB</div>
        <button class="icon-btn" id="git-refresh" title="Обновить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
      <div id="git-panel-body"></div>
    </div>
  </div>

  <!-- Bottom bar with 4 tabs -->
  <div id="bottombar">
    <button class="bottom-tab" data-tab="ai">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="8.5" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15.5" cy="10" r="1" fill="currentColor"/></svg>
      <span>Агент</span>
      <span class="badge" id="ai-badge">1</span>
    </button>
    <button class="bottom-tab" data-tab="explorer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span>Проводник</span>
    </button>
    <button class="bottom-tab" data-tab="editor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span>Редактор</span>
    </button>
    <button class="bottom-tab" data-tab="git">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
      <span>GitHub</span>
    </button>
  </div>
</div>

<!-- Drawer / side menu -->
<div id="drawer-scrim"></div>
<div id="drawer" aria-hidden="true">
  <div class="drawer-header">
    <h2>Mobile IDE</h2>
    <div class="sub" id="drawer-sub">Локально в браузере</div>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="drawer-item" data-action="about">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><circle cx="12" cy="8" r=".5" fill="currentColor"/></svg>
      <div class="label">О приложении</div>
    </div>
  </div>
</div>

<!-- Sheets & dialogs container -->
<div id="sheet-scrim" class="sheet-scrim"></div>
<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header"><h3 id="sheet-title">Заголовок</h3><button class="icon-btn" id="sheet-close">×</button></div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-footer" id="sheet-footer" style="display:none"></div>
</div>

<div id="dialog-scrim" class="dialog-scrim">
  <div class="dialog">
    <div class="dialog-header"><h3 id="dialog-title"></h3></div>
    <div class="dialog-body" id="dialog-body"></div>
    <div class="dialog-footer" id="dialog-footer"></div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-picker" style="display:none" multiple>
<input type="file" id="chat-attach-picker" style="display:none" multiple>

<div id="toast-holder"></div>

<!-- External libs (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@isomorphic-git/lightning-fs@4.6.0/dist/lightning-fs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/isomorphic-git@1.25.10/index.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/isomorphic-git@1.25.10/http/web/index.umd.js"></script>

<!-- App modules -->
<script src="js/core/util.js"></script>
<script src="js/core/highlight.js"></script>
<script src="js/core/store.js"></script>
<script src="js/core/fs.js"></script>
<script src="js/core/github-fs.js"></script>
<script src="js/core/local-fs.js"></script>
<script src="js/core/fs-router.js"></script>
<script src="js/core/ui.js"></script>
<script src="js/tabs/explorer.js"></script>
<script src="js/tabs/editor.js"></script>
<script src="js/tabs/git.js"></script>
<script src="js/tabs/ai.js"></script>
<script src="js/tabs/chats.js"></script>
<script src="js/core/tools.js"></script>
<script src="js/core/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
